<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<title>TallerPro</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js" crossorigin="anonymous"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3a;
    --accent: #00e5ff;
    --accent2: #ff6b35;
    --success: #00ff88;
    --warning: #ffcc00;
    --danger: #ff4444;
    --text: #e8e8f0;
    --text2: #8888aa;
    --font-head: 'Rajdhani', sans-serif;
    --font-body: 'Inter', sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:var(--font-body); min-height:100vh; overflow-x:hidden; }

  /* SPLASH */
  #splash { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:1000; transition:opacity .5s; }
  #splash .logo-big { font-family:var(--font-head); font-size:3rem; font-weight:700; color:var(--accent); letter-spacing:4px; }
  #splash .sub { color:var(--text2); font-size:.85rem; margin-top:.5rem; letter-spacing:2px; }
  #splash .loader { width:60px; height:3px; background:var(--border); border-radius:2px; margin-top:2rem; overflow:hidden; }
  #splash .loader-bar { height:100%; background:var(--accent); border-radius:2px; animation:load 1.5s ease forwards; }
  @keyframes load { from{width:0} to{width:100%} }

  /* LOGIN */
  #login-screen { display:none; min-height:100vh; align-items:center; justify-content:center; padding:1.5rem; flex-direction:column; }
  .login-box { width:100%; max-width:380px; }
  .login-logo { font-family:var(--font-head); font-size:2.5rem; font-weight:700; color:var(--accent); letter-spacing:4px; text-align:center; margin-bottom:.25rem; }
  .login-sub { text-align:center; color:var(--text2); font-size:.8rem; letter-spacing:2px; margin-bottom:2rem; }
  .login-tabs { display:flex; background:var(--surface2); border-radius:10px; padding:4px; margin-bottom:1.5rem; }
  .login-tab { flex:1; padding:.5rem; text-align:center; border:none; background:none; color:var(--text2); cursor:pointer; border-radius:8px; font-family:var(--font-body); font-size:.85rem; transition:all .2s; }
  .login-tab.active { background:var(--accent); color:#000; font-weight:600; }

  /* LAYOUT */
  #app { display:none; flex-direction:column; min-height:100vh; }
  .topbar { background:var(--surface); border-bottom:1px solid var(--border); padding:0 1rem; height:56px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
  .topbar-logo { font-family:var(--font-head); font-size:1.4rem; font-weight:700; color:var(--accent); letter-spacing:2px; }
  .topbar-right { display:flex; align-items:center; gap:.5rem; }
  .topbar-title { font-family:var(--font-head); font-size:1rem; color:var(--text2); }
  .topbar-role { font-size:.65rem; padding:2px 8px; border-radius:20px; font-weight:600; }
  .role-admin { background:rgba(0,229,255,.15); color:var(--accent); border:1px solid rgba(0,229,255,.3); }
  .role-empleado { background:rgba(255,107,53,.15); color:var(--accent2); border:1px solid rgba(255,107,53,.3); }
  .role-cliente { background:rgba(0,255,136,.15); color:var(--success); border:1px solid rgba(0,255,136,.3); }
  .logout-btn { background:none; border:none; color:var(--text2); cursor:pointer; font-size:.75rem; padding:.3rem .6rem; border-radius:6px; border:1px solid var(--border); }

  .content { flex:1; padding:1rem; padding-bottom:80px; max-width:600px; margin:0 auto; width:100%; }

  /* BOTTOM NAV */
  .bottom-nav { position:fixed; bottom:0; left:0; right:0; background:var(--surface); border-top:1px solid var(--border); display:flex; justify-content:flex-start; padding:.5rem 0; z-index:100; overflow-x:auto; scrollbar-width:none; }
  .bottom-nav::-webkit-scrollbar { display:none; }
  .nav-btn { display:flex; flex-direction:column; align-items:center; gap:2px; padding:.4rem .75rem; border:none; background:none; color:var(--text2); cursor:pointer; font-family:var(--font-body); font-size:.62rem; transition:color .2s; border-radius:8px; flex-shrink:0; min-width:64px; }
  .nav-btn svg { width:22px; height:22px; }
  .nav-btn.active { color:var(--accent); }
  .nav-btn.active svg { filter:drop-shadow(0 0 4px var(--accent)); }

  /* CARDS */
  .card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1rem; margin-bottom:.75rem; cursor:pointer; transition:border-color .2s, transform .1s; }
  .card:hover { border-color:var(--accent); }
  .card:active { transform:scale(.98); }
  .card-header { display:flex; align-items:center; gap:.75rem; }
  .card-avatar { width:44px; height:44px; border-radius:10px; background:var(--surface2); display:flex; align-items:center; justify-content:center; font-family:var(--font-head); font-size:1.2rem; font-weight:700; color:var(--accent); border:1px solid var(--border); flex-shrink:0; overflow:hidden; }
  .card-info { flex:1; min-width:0; }
  .card-name { font-family:var(--font-head); font-size:1.05rem; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .card-sub { font-size:.75rem; color:var(--text2); margin-top:2px; }
  .card-badge { font-size:.7rem; padding:3px 8px; border-radius:20px; font-weight:600; flex-shrink:0; }
  .badge-green { background:rgba(0,255,136,.15); color:var(--success); border:1px solid rgba(0,255,136,.3); }
  .badge-orange { background:rgba(255,107,53,.15); color:var(--accent2); border:1px solid rgba(255,107,53,.3); }
  .badge-yellow { background:rgba(255,204,0,.15); color:var(--warning); border:1px solid rgba(255,204,0,.3); }
  .badge-red { background:rgba(255,68,68,.15); color:var(--danger); border:1px solid rgba(255,68,68,.3); }
  .badge-blue { background:rgba(0,229,255,.15); color:var(--accent); border:1px solid rgba(0,229,255,.3); }

  /* SECTION HEADER */
  .section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem; }
  .section-title { font-family:var(--font-head); font-size:1.5rem; font-weight:700; color:var(--text); }
  .btn-add { background:var(--accent); color:#000; border:none; border-radius:8px; padding:.5rem 1rem; font-family:var(--font-head); font-size:.9rem; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:.4rem; letter-spacing:1px; transition:opacity .2s; }
  .btn-add:hover { opacity:.85; }

  /* SEARCH */
  .search-box { position:relative; margin-bottom:1rem; }
  .search-box input { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:.6rem 1rem .6rem 2.5rem; color:var(--text); font-family:var(--font-body); font-size:.9rem; outline:none; transition:border-color .2s; }
  .search-box input:focus { border-color:var(--accent); }
  .search-box svg { position:absolute; left:.75rem; top:50%; transform:translateY(-50%); color:var(--text2); width:16px; height:16px; }

  /* MODAL */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:200; display:flex; align-items:flex-end; justify-content:center; backdrop-filter:blur(4px); }
  .modal { background:var(--surface); border:1px solid var(--border); border-radius:20px 20px 0 0; padding:1.5rem; width:100%; max-width:600px; max-height:90vh; overflow-y:auto; animation:slideUp .3s ease; }
  @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .modal-title { font-family:var(--font-head); font-size:1.3rem; font-weight:700; color:var(--accent); margin-bottom:1.25rem; }
  .form-group { margin-bottom:1rem; }
  .form-label { font-size:.75rem; color:var(--text2); margin-bottom:.4rem; display:block; letter-spacing:.5px; text-transform:uppercase; }
  .form-input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:.65rem .9rem; color:var(--text); font-family:var(--font-body); font-size:.9rem; outline:none; transition:border-color .2s; }
  .form-input:focus { border-color:var(--accent); }
  select.form-input { cursor:pointer; }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:.75rem; }
  .btn-primary { width:100%; background:var(--accent); color:#000; border:none; border-radius:10px; padding:.75rem; font-family:var(--font-head); font-size:1rem; font-weight:700; cursor:pointer; letter-spacing:1px; margin-top:.5rem; transition:opacity .2s; }
  .btn-primary:hover { opacity:.85; }
  .btn-secondary { width:100%; background:transparent; color:var(--text2); border:1px solid var(--border); border-radius:10px; padding:.7rem; font-family:var(--font-head); font-size:.95rem; cursor:pointer; letter-spacing:1px; margin-top:.5rem; transition:border-color .2s; }
  .btn-secondary:hover { border-color:var(--accent); color:var(--accent); }
  .btn-danger { width:100%; background:rgba(255,68,68,.15); color:var(--danger); border:1px solid rgba(255,68,68,.3); border-radius:10px; padding:.7rem; font-family:var(--font-head); font-size:.95rem; cursor:pointer; letter-spacing:1px; margin-top:.5rem; transition:background .2s; }
  .btn-danger:hover { background:rgba(255,68,68,.25); }

  /* DETAIL */
  .detail-header { display:flex; align-items:center; gap:.75rem; margin-bottom:1.25rem; }
  .back-btn { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:.4rem .7rem; color:var(--text2); cursor:pointer; display:flex; align-items:center; gap:.3rem; font-size:.85rem; }
  .detail-avatar { width:56px; height:56px; border-radius:12px; background:var(--surface2); display:flex; align-items:center; justify-content:center; font-family:var(--font-head); font-size:1.6rem; font-weight:700; color:var(--accent); border:2px solid var(--accent); flex-shrink:0; }
  .detail-name { font-family:var(--font-head); font-size:1.4rem; font-weight:700; }
  .detail-sub { font-size:.8rem; color:var(--text2); }
  .info-grid { display:grid; grid-template-columns:1fr 1fr; gap:.6rem; margin-bottom:1rem; }
  .info-item { background:var(--surface2); border-radius:8px; padding:.6rem .8rem; border:1px solid var(--border); }
  .info-item .label { font-size:.65rem; color:var(--text2); text-transform:uppercase; letter-spacing:.5px; }
  .info-item .value { font-size:.9rem; color:var(--text); margin-top:2px; font-weight:500; }
  .sub-section { margin-top:1.25rem; }
  .sub-section-title { font-family:var(--font-head); font-size:1rem; color:var(--text2); margin-bottom:.6rem; letter-spacing:1px; border-bottom:1px solid var(--border); padding-bottom:.4rem; }

  /* STATS */
  .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:.75rem; margin-bottom:1.25rem; }
  .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1rem; text-align:center; }
  .stat-value { font-family:var(--font-head); font-size:1.8rem; font-weight:700; color:var(--accent); }
  .stat-label { font-size:.72rem; color:var(--text2); margin-top:4px; }

  /* TABS */
  .tabs { display:flex; gap:.5rem; margin-bottom:1rem; overflow-x:auto; padding-bottom:.25rem; scrollbar-width:none; }
  .tabs::-webkit-scrollbar { display:none; }
  .tab { padding:.4rem .9rem; border-radius:20px; border:1px solid var(--border); background:none; color:var(--text2); font-size:.8rem; cursor:pointer; white-space:nowrap; transition:all .2s; font-family:var(--font-body); }
  .tab.active { background:var(--accent); color:#000; border-color:var(--accent); font-weight:600; }

  /* INVENTARIO */
  .inv-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:.85rem; margin-bottom:.6rem; display:flex; align-items:center; gap:.75rem; cursor:pointer; }
  .inv-icon { width:40px; height:40px; background:var(--surface2); border-radius:8px; display:flex; align-items:center; justify-content:center; border:1px solid var(--border); flex-shrink:0; }
  .inv-info { flex:1; min-width:0; }
  .inv-name { font-weight:500; font-size:.9rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .inv-meta { font-size:.75rem; color:var(--text2); margin-top:2px; }
  .inv-stock { text-align:right; flex-shrink:0; }
  .inv-qty { font-family:var(--font-head); font-size:1.3rem; font-weight:700; }
  .inv-unit { font-size:.7rem; color:var(--text2); }
  .stock-low { color:var(--danger); }
  .stock-ok { color:var(--success); }

  /* EMPTY & LOADING */
  .empty { text-align:center; padding:3rem 1rem; color:var(--text2); }
  .empty svg { width:48px; height:48px; margin-bottom:1rem; opacity:.3; }
  .empty p { font-size:.9rem; }
  .loading { text-align:center; padding:2rem; color:var(--text2); font-size:.85rem; }

  /* TOAST */
  #toast { position:fixed; top:1rem; left:50%; transform:translateX(-50%); background:var(--surface2); border:1px solid var(--accent); color:var(--text); padding:.6rem 1.2rem; border-radius:8px; font-size:.85rem; z-index:999; opacity:0; transition:opacity .3s; pointer-events:none; white-space:nowrap; }
  #toast.show { opacity:1; }

  /* FACTURA */
  .factura-item { display:flex; justify-content:space-between; padding:.5rem 0; border-bottom:1px solid var(--border); font-size:.85rem; }
  .factura-total { display:flex; justify-content:space-between; padding:.75rem 0; font-family:var(--font-head); font-size:1.1rem; color:var(--accent); }

  /* DASHBOARD PANELS (extracted from inline styles) */
  .dash-welcome { font-family:var(--font-head); font-size:1.3rem; color:var(--text); margin-bottom:.15rem; }
  .dash-sub { font-size:.75rem; color:var(--text2); margin-bottom:1rem; }
  .panel { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1rem; margin-bottom:1rem; display:flex; justify-content:space-between; align-items:center; }
  .panel-label { font-size:.72rem; color:var(--text2); letter-spacing:1px; font-family:var(--font-head); }
  .panel-value { font-family:var(--font-head); font-size:1.8rem; font-weight:700; }
  .panel-sub { font-size:.72rem; color:var(--text2); }
  .panel-icon { font-size:2rem; }
  .panel-danger { background:rgba(255,68,68,.08); border:1px solid rgba(255,68,68,.3); border-radius:12px; padding:1rem; margin-bottom:1rem; display:flex; justify-content:space-between; align-items:center; }
  .alert-box { background:rgba(255,68,68,.08); border:1px solid rgba(255,68,68,.3); border-radius:10px; padding:.75rem; margin-bottom:1rem; cursor:pointer; }
  .alert-title { font-size:.72rem; color:var(--danger); font-family:var(--font-head); letter-spacing:1px; margin-bottom:.4rem; }
  .alert-item { font-size:.82rem; color:var(--text2); padding:.2rem 0; }
  .section-label { font-family:var(--font-head); font-size:.8rem; color:var(--text2); letter-spacing:2px; margin-bottom:.6rem; }
  .whatsapp-btn { background:rgba(37,211,102,.15); color:#25d366; border:1px solid rgba(37,211,102,.3); border-radius:10px; padding:.6rem; font-family:var(--font-head); font-size:.9rem; cursor:pointer; }
  .action-row { display:flex; gap:.5rem; margin-bottom:1rem; }
  .action-grid { display:grid; grid-template-columns:1fr 1fr; gap:.5rem; margin-bottom:1rem; }
  .total-banner { background:rgba(255,68,68,.1); border:1px solid rgba(255,68,68,.3); border-radius:10px; padding:.75rem 1rem; margin-bottom:1rem; display:flex; justify-content:space-between; align-items:center; }
  .code-display { background:var(--surface2); border-radius:10px; padding:1rem; text-align:center; margin-bottom:.75rem; }
  .code-value { font-family:var(--font-head); font-size:2.2rem; font-weight:700; letter-spacing:6px; }
  .link-box { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:.6rem; font-size:.72rem; color:var(--text2); word-break:break-all; margin-bottom:.5rem; }
  .info-banner { background:rgba(0,229,255,.05); border:1px solid rgba(0,229,255,.2); border-radius:10px; padding:.75rem; margin-bottom:1.25rem; text-align:center; font-size:.82rem; color:var(--text2); }
  .foto-preview { width:100%; max-height:200px; object-fit:cover; border-radius:12px; margin-bottom:1rem; border:1px solid var(--border); }
  .foto-thumb { width:44px; height:44px; object-fit:cover; border-radius:8px; border:1px solid var(--border); }

  /* PAGINATION */
  .btn-load-more { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:.7rem; color:var(--text2); font-family:var(--font-head); font-size:.9rem; cursor:pointer; letter-spacing:1px; margin-top:.5rem; transition:all .2s; }
  .btn-load-more:hover { border-color:var(--accent); color:var(--accent); }

  /* PRINT */
  @media print {
    body * { visibility: hidden; }
    #factura-imprimible, #factura-imprimible * { visibility: visible; color: #000 !important; background: #fff !important; border-color: #ccc !important; }
    #factura-imprimible { position: fixed; top: 0; left: 0; width: 100%; padding: 2rem; font-size: 14px; }
  }
</style>
</head>
<body>

<div id="splash">
  <div class="logo-big">TALLERPRO</div>
  <div class="sub">GESTIÓN INTELIGENTE</div>
  <div class="loader"><div class="loader-bar"></div></div>
</div>

<div id="toast"></div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">TALLERPRO</div>
    <div class="login-sub">GESTIÓN INTELIGENTE</div>
    <div id="login-form">

      <!-- LOGIN NORMAL -->
      <div id="login-normal">
        <div class="login-tabs">
          <button class="login-tab active" onclick="switchLoginTab('login')">Ingresar</button>
          <button class="login-tab" id="tab-nuevo-taller" onclick="switchLoginTab('nuevo-taller')">Nuevo Taller</button>
        </div>

        <!-- NUEVO TALLER (ADMIN) -->
        <div id="nuevo-taller-fields" style="display:none">
          <div style="background:rgba(0,229,255,.05);border:1px solid rgba(0,229,255,.2);border-radius:8px;padding:.75rem;margin-bottom:1rem;font-size:.8rem;color:var(--text2)">
            Registrá tu taller y creá tu cuenta de administrador.
          </div>
          <div class="form-group"><label class="form-label">Tu nombre *</label><input class="form-input" id="reg-nombre-admin" placeholder="Tu nombre completo"></div>
          <div class="form-group"><label class="form-label">Nombre del taller *</label><input class="form-input" id="reg-taller" placeholder="Taller San José"></div>
          <div class="form-group"><label class="form-label">Teléfono del taller</label><input class="form-input" id="reg-tel" placeholder="+595 21 000 000"></div>
        </div>

        <div class="form-group"><label class="form-label">Email *</label><input class="form-input" id="auth-email" type="email" placeholder="tu@email.com"></div>
        <div class="form-group"><label class="form-label">Contraseña *</label><input class="form-input" id="auth-pass" type="password" placeholder="••••••••"></div>
        <button class="btn-primary" id="auth-btn" onclick="handleAuth()">INGRESAR</button>
        <p id="auth-error" style="color:var(--danger);font-size:.8rem;margin-top:.75rem;text-align:center;display:none"></p>
        <div id="forgot-link" style="text-align:center;margin-top:.75rem">
          <button onclick="switchLoginTab('forgot')" style="background:none;border:none;color:var(--text2);font-size:.8rem;cursor:pointer;text-decoration:underline">¿Olvidaste tu contraseña?</button>
        </div>
      </div>

      <!-- REGISTRO POR INVITACIÓN -->
      <div id="login-invitacion" style="display:none">
        <div style="background:rgba(0,229,255,.05);border:1px solid rgba(0,229,255,.2);border-radius:10px;padding:.75rem;margin-bottom:1.25rem;text-align:center;font-size:.82rem;color:var(--text2)">
          Fuiste invitado a un taller. Completá tus datos para registrarte.
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Nombre *</label><input class="form-input" id="inv-nombre" placeholder="Juan"></div>
          <div class="form-group"><label class="form-label">Apellido *</label><input class="form-input" id="inv-apellido" placeholder="Pérez"></div>
        </div>
        <div class="form-group" id="inv-tel-group">
          <label class="form-label">Teléfono *</label>
          <input class="form-input" id="inv-telefono" type="tel" placeholder="+595 981 000 000">
        </div>
        <div class="form-group">
          <label class="form-label">Código *</label>
          <input class="form-input" id="inv-codigo" placeholder="Código del taller" style="text-transform:uppercase;letter-spacing:3px" oninput="onCodigoInput(this.value)">
          <div style="font-size:.72rem;color:var(--text2);margin-top:.3rem" id="inv-codigo-hint">El admin te da el código. Define si sos cliente o empleado.</div>
        </div>
        <div class="form-group"><label class="form-label">Email *</label><input class="form-input" id="inv-email" type="email" placeholder="tu@email.com"></div>
        <div class="form-group"><label class="form-label">Contraseña *</label><input class="form-input" id="inv-pass" type="password" placeholder="Mínimo 6 caracteres"></div>
        <button class="btn-primary" onclick="handleRegistroInvitacion()">REGISTRARME</button>
        <p id="inv-error" style="color:var(--danger);font-size:.8rem;margin-top:.75rem;text-align:center;display:none"></p>
        <div style="text-align:center;margin-top:.75rem">
          <button onclick="showLoginNormal()" style="background:none;border:none;color:var(--text2);font-size:.8rem;cursor:pointer;text-decoration:underline">Ya tengo cuenta → Ingresar</button>
        </div>
      </div>

    </div>

// Link de invitación: detectar ?taller=ID (validado como UUID)
const urlParams       = new URLSearchParams(window.location.search);
const _rawTallerId    = urlParams.get('taller');
const UUID_REGEX      = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
const tallerIdFromUrl = (_rawTallerId && UUID_REGEX.test(_rawTallerId)) ? _rawTallerId : null;

// Splash: tiempo de inicio para sincronizar animación
const splashStart = Date.now();

// ─── SPLASH ───────────────────────────────────────────────────────────────────
function hideSplash(immediate = false) {
  const splash = document.getElementById('splash');
  if (!splash || splash.style.display === 'none') return;
  if (immediate) { splash.style.display = 'none'; return; }
  splash.style.pointerEvents = 'none';
  splash.style.zIndex = '-1';
  const remaining = Math.max(0, 1600 - (Date.now() - splashStart));
  setTimeout(() => {
    splash.style.opacity = '0';
    setTimeout(() => { splash.style.display = 'none'; }, 400);
  }, remaining);
}

// ─── INIT ────────────────────────────────────────────────────────────────────
window.addEventListener('load', async () => {
  if (recoveryMode) {
    hideSplash(true);
    mostrarFormCambiarPass();
    return;
  }
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      hideSplash(true);
      await loadPerfil(session.user);
    } else {
      hideSplash();
      showLogin();
    }
  } catch(e) {
    hideSplash(true);
    showLogin();
  }
});

// onAuthStateChange: recovery y logout solamente
sb.auth.onAuthStateChange(async (event, session) => {
  if (event === 'PASSWORD_RECOVERY') {
    recoveryMode = true;
    hideSplash(true);
    mostrarFormCambiarPass();
  } else if (event === 'SIGNED_OUT') {
    recoveryMode = false;
    currentUser = null;
    currentPerfil = null;
    showLogin();
  }
});

async function loadPerfil(user) {
  currentUser = user;
  try {
    const { data: perfil, error } = await sb.from('perfiles')
      .select('id, nombre, rol, taller_id, talleres(id, nombre, telefono)')
      .eq('id', user.id)
      .maybeSingle();
    if (error) { showLogin(); return; }
    if (!perfil) {
      const { data: nuevo } = await sb.from('perfiles')
        .insert({ id: user.id, nombre: user.email, rol: 'cliente', taller_id: null })
        .select('id, nombre, rol, taller_id, talleres(id, nombre, telefono)')
        .maybeSingle();
      currentPerfil = nuevo;
      showCodigoPrompt();
      return;
    }
    currentPerfil = perfil;
    if (perfil.taller_id && (perfil.rol === 'admin' || perfil.rol === 'empleado' || perfil.rol === 'cliente')) {
      showApp();
    } else {
      showCodigoPrompt();
    }
  } catch(e) {
    showLogin();
  }
}

function showCodigoPrompt() {
  document.getElementById('splash').style.display = 'none';
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-form').innerHTML = `
    <div class="login-logo" style="margin-bottom:.5rem">TALLERPRO</div>
    <div style="font-family:var(--font-head);font-size:1rem;color:var(--text2);text-align:center;margin-bottom:1.5rem;letter-spacing:1px">BIENVENIDO</div>
    <div style="background:rgba(0,229,255,.05);border:1px solid rgba(0,229,255,.2);border-radius:10px;padding:.75rem;margin-bottom:1.25rem;font-size:.82rem;color:var(--text2);text-align:center">
      Tu cuenta no está vinculada a ningún taller. Ingresá el código que te dio el administrador.
    </div>
    <div class="form-group">
      <label class="form-label">Código *</label>
      <input class="form-input" id="prompt-codigo" placeholder="Ingresá tu código" style="text-transform:uppercase;letter-spacing:3px">
    </div>
    <button class="btn-primary" onclick="aplicarCodigo()">CONTINUAR</button>
    <p id="auth-error" style="color:var(--danger);font-size:.8rem;margin-top:.75rem;text-align:center;display:none"></p>
    <button class="btn-secondary" onclick="logout()" style="margin-top:.5rem">Cerrar sesión</button>`;
}

async function aplicarCodigo() {
  const codigo = document.getElementById('prompt-codigo').value.trim().toUpperCase();
  const errEl = document.getElementById('auth-error');
  if (!codigo) { errEl.textContent = 'El código es obligatorio'; errEl.style.display = 'block'; return; }
  const { data: cod } = await sb.from('codigos_empleado')
    .select('*').eq('codigo', codigo).eq('usado', false).single();
  if (!cod) { errEl.textContent = 'Código inválido o ya utilizado'; errEl.style.display = 'block'; return; }
  const rolNuevo = cod.tipo === 'empleado' ? 'empleado' : 'cliente';
  await sb.from('perfiles').update({ rol: rolNuevo, taller_id: cod.taller_id }).eq('id', currentUser.id);
  await sb.from('codigos_empleado').update({ usado: true, usado_por: currentUser.id }).eq('codigo', codigo);
  if (rolNuevo === 'cliente') {
    const { data: perfActual } = await sb.from('perfiles').select('cliente_id').eq('id', currentUser.id).maybeSingle();
    if (!perfActual?.cliente_id) {
      const { data: cli } = await sb.from('clientes')
        .insert({ nombre: currentPerfil?.nombre || currentUser.email, taller_id: cod.taller_id })
        .select().single();
      if (cli) await sb.from('perfiles').update({ cliente_id: cli.id }).eq('id', currentUser.id);
    }
  }
  const { data: perfil } = await sb.from('perfiles')
    .select('id, nombre, rol, taller_id, talleres(id, nombre, telefono)')
    .eq('id', currentUser.id).maybeSingle();
  currentPerfil = perfil;
  toast(rolNuevo === 'empleado' ? 'Registrado como empleado' : 'Registrado como cliente', 'success');
  showApp();
}

function switchLoginTab(tab) {
  loginTab = tab;
  document.querySelectorAll('.login-tab').forEach((t,i) => {
    t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')||(i===2&&tab==='nuevo-taller'));
  });
  const regFields = document.getElementById('register-fields');
  if (regFields) regFields.style.display = tab==='register' ? 'block' : 'none';
  document.getElementById('nuevo-taller-fields').style.display = tab==='nuevo-taller' ? 'block' : 'none';
  document.getElementById('forgot-link').style.display = tab==='login' ? 'block' : 'none';
  const forgotMode = tab === 'forgot';
  document.getElementById('auth-pass').style.display = forgotMode ? 'none' : 'block';
  document.getElementById('auth-pass').previousElementSibling.style.display = forgotMode ? 'none' : 'block';
  if (forgotMode) {
    document.getElementById('auth-btn').textContent = 'ENVIAR LINK';
    document.getElementById('auth-btn').onclick = handleForgotPassword;
    document.getElementById('forgot-link').innerHTML = `<button onclick="switchLoginTab('login')" style="background:none;border:none;color:var(--text2);font-size:.8rem;cursor:pointer;text-decoration:underline">← Volver al login</button>`;
  } else {
    const labels = { login:'INGRESAR', register:'REGISTRARME', 'nuevo-taller':'CREAR TALLER' };
    document.getElementById('auth-btn').textContent = labels[tab] || 'INGRESAR';
    document.getElementById('auth-btn').onclick = handleAuth;
  }
}

  const pass = document.getElementById('inv-pass').value;
  const errEl = document.getElementById('inv-error');
  const btn = document.querySelector('#login-invitacion .btn-primary');
  errEl.style.display = 'none';

  if (!nombre || !apellido) { errEl.textContent = 'Nombre y apellido son obligatorios'; errEl.style.display = 'block'; return; }
  if (!codigo) { errEl.textContent = 'El código es obligatorio'; errEl.style.display = 'block'; return; }
  if (!email || !pass) { errEl.textContent = 'Email y contraseña son obligatorios'; errEl.style.display = 'block'; return; }
  if (pass.length < 6) { errEl.textContent = 'La contraseña debe tener al menos 6 caracteres'; errEl.style.display = 'block'; return; }

  btn.textContent = 'REGISTRANDO...';
  btn.disabled = true;

  // Verificar código
  const { data: cod, error: codError } = await sb.from('codigos_empleado')
    .select('*').eq('codigo', codigo).eq('usado', false).single();
  if (codError || !cod) {
    errEl.textContent = 'Código inválido o ya utilizado';
    errEl.style.display = 'block';
    btn.textContent = 'REGISTRARME'; btn.disabled = false;
    return;
  }
  if (cod.taller_id !== tallerIdFromUrl) {
    errEl.textContent = 'El código no corresponde a este taller';
    errEl.style.display = 'block';
    btn.textContent = 'REGISTRARME'; btn.disabled = false;
    return;
  }

  const rolFinal = cod.tipo === 'empleado' ? 'empleado' : 'cliente';

  // Teléfono obligatorio para clientes
  if (rolFinal === 'cliente' && !telefono) {
    errEl.textContent = 'El teléfono es obligatorio';
    errEl.style.display = 'block';
    btn.textContent = 'REGISTRARME'; btn.disabled = false;
    return;
  }

  // Crear cuenta
  const { data, error } = await sb.auth.signUp({ email, password: pass });
  if (error) {
    errEl.textContent = error.message;
    errEl.style.display = 'block';
    btn.textContent = 'REGISTRARME'; btn.disabled = false;
    return;
  }

  const nombreCompleto = `${nombre} ${apellido}`;

  // Crear perfil
  await sb.from('perfiles').insert({
    id: data.user.id,
    nombre: nombreCompleto,
    rol: rolFinal,
    taller_id: cod.taller_id
  });

  // Si es cliente, crear ficha y vincular
  if (rolFinal === 'cliente') {
    const { data: cli } = await sb.from('clientes')
      .insert({ nombre: nombreCompleto, telefono, taller_id: cod.taller_id })
      .select().single();
    if (cli) await sb.from('perfiles').update({ cliente_id: cli.id }).eq('id', data.user.id);
  }

  // Marcar código como usado
  await sb.from('codigos_empleado').update({ usado: true, usado_por: data.user.id }).eq('codigo', codigo);

  toast(`¡Bienvenido ${nombre}!`, 'success');
  btn.textContent = 'REGISTRARME'; btn.disabled = false;

  // Ingresar directamente
  await loadPerfil(data.user);
}

async function handleAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const pass = document.getElementById('auth-pass').value;
  const btn = document.getElementById('auth-btn');
  showAuthError('');
  if (!email || !pass) { showAuthError('Completá todos los campos'); return; }
  btn.textContent = 'CARGANDO...';
  btn.disabled = true;

  if (loginTab === 'login') {
    const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
    if (error) {
      showAuthError('Email o contraseña incorrectos');
      btn.textContent = 'INGRESAR'; btn.disabled = false;
      return;
    }
    await loadPerfil(data.user);

  } else if (loginTab === 'nuevo-taller') {
    const nombre = document.getElementById('reg-nombre-admin').value.trim();
    const tallerNombre = document.getElementById('reg-taller').value.trim();
    const tallerTel = document.getElementById('reg-tel').value.trim();
    if (!nombre || !tallerNombre) { showAuthError('Completá todos los campos'); btn.textContent = 'CREAR TALLER'; btn.disabled = false; return; }
    const { data, error } = await sb.auth.signUp({ email, password: pass });
    if (error) { showAuthError(error.message); btn.textContent = 'CREAR TALLER'; btn.disabled = false; return; }
    const { data: taller } = await sb.from('talleres').insert({ nombre: tallerNombre, telefono: tallerTel }).select().single();
    await sb.from('perfiles').insert({ id: data.user.id, nombre, rol: 'admin', taller_id: taller.id });
    toast('¡Taller creado! Ingresá con tu email y contraseña.', 'success');
    btn.textContent = 'CREAR TALLER'; btn.disabled = false;
    switchLoginTab('login');
  }
}

async function navigate(page, params = {}) {
  currentPage = page;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const navEl = document.getElementById('nav-' + page);
  if (navEl) navEl.classList.add('active');

function toast(msg, type = 'info') {

// ─── MODAL ───────────────────────────────────────────────────────────────────
function openModal(html) {
  closeModal();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'modal-overlay';
  overlay.innerHTML = `<div class="modal">${html}</div>`;
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
  document.body.appendChild(overlay);
}
function closeModal() {
  const m = document.getElementById('modal-overlay');
  if (m) m.remove();
}

// ─── PAGINACIÓN ─────────────────────────────────────────────────────────────
const PAGE_SIZE = 30;
function renderPagination(total, offset, onNavigate) {
  if (total <= PAGE_SIZE) return '';
  const hasPrev = offset > 0;
  const hasNext = offset + PAGE_SIZE < total;
  const current = Math.floor(offset / PAGE_SIZE) + 1;
  const totalPages = Math.ceil(total / PAGE_SIZE);
  return `<div style="display:flex;justify-content:center;align-items:center;gap:1rem;padding:1rem 0">
    ${hasPrev ? `<button onclick="${onNavigate}(${offset - PAGE_SIZE})" style="background:var(--surface2);border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:.4rem .8rem;cursor:pointer;font-size:.8rem">← Anterior</button>` : ''}
    <span style="font-size:.75rem;color:var(--text2)">${current} / ${totalPages}</span>
    ${hasNext ? `<button onclick="${onNavigate}(${offset + PAGE_SIZE})" style="background:var(--surface2);border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:.4rem .8rem;cursor:pointer;font-size:.8rem">Siguiente →</button>` : ''}
  </div>`;
}

const _debounceTimers = {};
function debounce(key, fn, ms = 400) {
  clearTimeout(_debounceTimers[key]);
  _debounceTimers[key] = setTimeout(fn, ms);
}

function formatFecha(f) { if (!f) return ''; const [y,m,d] = f.split('-'); return `${d}/${m}/${y}`; }

// ─── BÚSQUEDA POR PATENTE ─────────────────────────────────────────────────────
let patenteBusquedaTimer = null;
async function buscarPatente(valor) {
  const resultsEl = document.getElementById('patente-results');
  if (!resultsEl) return;
  const patente = valor.trim().toUpperCase();
  if (!patente) { resultsEl.innerHTML = ''; return; }
  clearTimeout(patenteBusquedaTimer);
  patenteBusquedaTimer = setTimeout(async () => {
    const { data: vehs } = await sb.from('vehiculos')
      .select('*, clientes(nombre,telefono), reparaciones(id,descripcion,estado,costo,fecha)')
      .eq('taller_id', tid())
      .ilike('patente', `%${patente}%`)
      .limit(3);
    if (!vehs || vehs.length === 0) {

async function reportes() {
  const hoy = fechaHoy();
  const primerMes = primerDiaMes();
  const primerSemana = (() => {
    const d = new Date();
    d.setDate(d.getDate() - d.getDay());
    return d.toISOString().split('T')[0];
  })();

  const [
    { data: repsHoy },
    { data: repsSemana },
    { data: repsMes },
    { data: todasReps },
    { data: creditosPend }
  ] = await Promise.all([
    sb.from('reparaciones').select('costo').eq('taller_id',tid()).eq('estado','finalizado').eq('fecha',hoy),
    sb.from('reparaciones').select('costo').eq('taller_id',tid()).eq('estado','finalizado').gte('fecha',primerSemana),
    sb.from('reparaciones').select('costo').eq('taller_id',tid()).eq('estado','finalizado').gte('fecha',primerMes),
    sb.from('reparaciones').select('descripcion,costo').eq('taller_id',tid()).eq('estado','finalizado').gte('fecha',primerMes),
    sb.from('fiados').select('monto').eq('taller_id',tid()).eq('pagado',false)
  ]);

  const ganHoy = (repsHoy||[]).reduce((s,r)=>s+parseFloat(r.costo||0),0);
  const ganSemana = (repsSemana||[]).reduce((s,r)=>s+parseFloat(r.costo||0),0);
  const ganMes = (repsMes||[]).reduce((s,r)=>s+parseFloat(r.costo||0),0);
  const totalCréditos = (creditosPend||[]).reduce((s,f)=>s+parseFloat(f.monto||0),0);

  const serviciosCount = {};
  (todasReps||[]).forEach(r => {
    const key = r.descripcion || 'Sin descripción';
    serviciosCount[key] = (serviciosCount[key]||0) + parseFloat(r.costo||0);
  });
  const topServicios = Object.entries(serviciosCount).sort((a,b)=>b[1]-a[1]).slice(0,5);

  document.getElementById('main-content').innerHTML = `
    <div style="padding:.25rem 0">
      <div style="font-family:var(--font-head);font-size:.8rem;color:var(--text2);letter-spacing:2px;margin-bottom:.75rem">${t('repGanancias')}</div>
      <div class="stats-grid" style="margin-bottom:1rem">
        <div class="stat-card"><div class="stat-value" style="font-size:1.3rem">₲${gs(ganHoy)}</div><div class="stat-label">${t('repHoy2')}</div></div>
        <div class="stat-card"><div class="stat-value" style="font-size:1.3rem">₲${gs(ganSemana)}</div><div class="stat-label">${t('repSemana')}</div></div>
      </div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1rem;margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-size:.72rem;color:var(--text2);letter-spacing:1px;font-family:var(--font-head)">${t('repMes')}</div>
          <div style="font-family:var(--font-head);font-size:2rem;font-weight:700;color:var(--success)">₲${gs(ganMes)}</div>
          <div style="font-size:.72rem;color:var(--text2)">${(repsMes||[]).length} ${t('repRepsFinalizadas')}</div>
        </div>
        <div style="font-size:2.5rem">💰</div>
      </div>
      <div style="background:rgba(255,68,68,.08);border:1px solid rgba(255,68,68,.3);border-radius:12px;padding:1rem;margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-size:.72rem;color:var(--danger);letter-spacing:1px;font-family:var(--font-head)">${t('repFiados')}</div>
          <div style="font-family:var(--font-head);font-size:1.8rem;font-weight:700;color:var(--danger)">₲${gs(totalCréditos)}</div>
        </div>
        <button onclick="navigate('creditos')" style="background:rgba(255,68,68,.15);border:1px solid rgba(255,68,68,.3);color:var(--danger);border-radius:8px;padding:.5rem .75rem;font-size:.8rem;cursor:pointer">${t('repVerCreditos')}</button>
      </div>
      ${topServicios.length > 0 ? `
      <div style="font-family:var(--font-head);font-size:.8rem;color:var(--text2);letter-spacing:2px;margin-bottom:.6rem">${t('repTopServ')}</div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:.75rem;margin-bottom:1rem">
        ${topServicios.map(([desc,total],i) => `
          <div style="display:flex;justify-content:space-between;align-items:center;padding:.5rem 0;border-bottom:1px solid var(--border)">
            <div style="display:flex;gap:.5rem;align-items:center">

  const nombre = document.getElementById('f-nombre').value.trim();

  const data = { nombre, telefono:document.getElementById('f-tel').value, email:document.getElementById('f-email').value, taller_id:tid() };

const MAX_FOTO_SIZE = 5 * 1024 * 1024; // 5MB
const ALLOWED_FOTO_TYPES = ['image/jpeg', 'image/png', 'image/webp'];

function previewFoto(input, hiddenId, previewId) {
  const file = input.files[0];
  if (!file) return;
  if (!ALLOWED_FOTO_TYPES.includes(file.type)) {
    toast('Solo se permiten imágenes JPG, PNG o WebP','error');
    input.value = '';
    return;
  }
  if (file.size > MAX_FOTO_SIZE) {
    toast('La imagen no puede superar 5MB','error');
    input.value = '';
    return;
  }
  const reader = new FileReader();
  reader.onload = e => {
    // Comprimir imagen via canvas
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const MAX_DIM = 800;
      let w = img.width, ht = img.height;
      if (w > MAX_DIM || ht > MAX_DIM) {
        if (w > ht) { ht = Math.round(ht * MAX_DIM / w); w = MAX_DIM; }
        else { w = Math.round(w * MAX_DIM / ht); ht = MAX_DIM; }
      }
      canvas.width = w; canvas.height = ht;
      canvas.getContext('2d').drawImage(img, 0, 0, w, ht);
      const compressed = canvas.toDataURL('image/jpeg', 0.7);
      document.getElementById(previewId).innerHTML = `<img src="${compressed}" style="width:100%;max-height:150px;object-fit:cover;border-radius:8px;border:1px solid var(--border)">`;
      document.getElementById(hiddenId).value = compressed;
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// Validar que foto_url sea segura antes de renderizar
function safeFotoUrl(url) {
  if (!url) return '';
  if (url.startsWith('data:image/jpeg') || url.startsWith('data:image/png') || url.startsWith('data:image/webp')) return url;
  if (url.startsWith('https://')) return url;
  return ''; // Rechazar cualquier otro esquema
}

async function descontarStock(id, stockActual) {
  const descuento = parseFloat(document.getElementById('f-descuento').value)||0;
  if (descuento<=0) { toast('Ingresá una cantidad válida','error'); return; }

  const { error } = await sb.from('inventario').update({ cantidad: stockActual - descuento }).eq('id',id);
  if (error) { toast('Error','error'); return; }
  toast('Stock actualizado','success'); closeModal(); inventario();
}

async function compartirFactura(id) {
  const { data:f } = await sb.from('facturas').select('*, clientes(nombre,telefono), reparaciones(descripcion,vehiculos(patente,marca))').eq('id',id).single();
  if (!f) return;
  const tallerNombre = currentPerfil?.talleres?.nombre || 'TallerPro';

  toast(t('generandoPdf'), 'info');

  try {
    // Lazy load jsPDF solo cuando se necesita
    if (!window.jspdf) {
      await new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
        s.crossOrigin = 'anonymous';
        s.onload = resolve;
        s.onerror = () => reject(new Error('No se pudo cargar jsPDF'));
        document.head.appendChild(s);
      });
    }
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: 'mm', format: 'a4' });

    const margen = 20;
    let y = 20;

    // Header
    doc.setFillColor(10, 10, 15);
    doc.rect(0, 0, 210, 35, 'F');
    doc.setTextColor(0, 229, 255);
    doc.setFontSize(22);
    doc.setFont('helvetica', 'bold');
    doc.text(tallerNombre.toUpperCase(), margen, 18);
    doc.setFontSize(9);
    doc.setTextColor(136, 136, 170);
    doc.text('GESTIÓN INTELIGENTE', margen, 26);
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(10);
    doc.text(`Fecha: ${formatFecha(f.fecha)}`, 210 - margen, 18, { align: 'right' });
    doc.text(`Estado: ${f.pagada ? 'PAGADA' : 'PENDIENTE'}`, 210 - margen, 26, { align: 'right' });

    y = 45;

    // Título
    doc.setFillColor(26, 26, 38);
    doc.rect(margen, y - 5, 170, 10, 'F');
    doc.setTextColor(0, 229, 255);
    doc.setFontSize(11);
    doc.setFont('helvetica', 'bold');
    doc.text('DETALLE DE FACTURA', margen + 5, y + 2);
    y += 15;

    // Datos
    doc.setTextColor(60, 60, 80);
    doc.setFontSize(9);
    doc.setFont('helvetica', 'normal');

    const filas = [
      ['Cliente', f.clientes?.nombre || '-'],
      ['Vehículo', f.reparaciones?.vehiculos ? `${f.reparaciones.vehiculos.patente} · ${f.reparaciones.vehiculos.marca}` : '-'],
      ['Reparación', f.reparaciones?.descripcion || '-'],
    ];

    filas.forEach(([label, valor]) => {
      doc.setTextColor(136, 136, 170);
      doc.text(label, margen, y);
      doc.setTextColor(30, 30, 50);
      doc.setFont('helvetica', 'bold');
      doc.text(valor, margen + 35, y);
      doc.setFont('helvetica', 'normal');
      doc.setDrawColor(220, 220, 230);
      doc.line(margen, y + 2, 190, y + 2);
      y += 10;
    });

    y += 5;

    // Montos
    doc.setFillColor(245, 245, 250);
    doc.rect(margen, y - 5, 170, 45, 'F');

    const montos = [
      ['Mano de obra', f.mano_obra],
      ['Repuestos', f.repuestos],
      ['Otros', f.otros],
    ];

    montos.forEach(([label, monto]) => {
      doc.setTextColor(80, 80, 100);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(10);
      doc.text(label, margen + 5, y);
      doc.text(`₲ ${gs(monto)}`, 190, y, { align: 'right' });
      doc.setDrawColor(210, 210, 220);
      doc.line(margen + 5, y + 2, 185, y + 2);
      y += 10;
    });

    // Total
    doc.setFillColor(0, 229, 255);
    doc.rect(margen, y - 3, 170, 12, 'F');
    doc.setTextColor(0, 0, 0);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(12);
    doc.text('TOTAL', margen + 5, y + 5);
    doc.text(`₲ ${gs(f.total)}`, 190, y + 5, { align: 'right' });
    y += 20;

    // Notas
    if (f.notas) {
      doc.setTextColor(100, 100, 120);
      doc.setFont('helvetica', 'italic');
      doc.setFontSize(9);
      doc.text(`Notas: ${h(f.notas)}`, margen, y);
      y += 10;
    }

    // Footer
    doc.setFillColor(10, 10, 15);
    doc.rect(0, 277, 210, 20, 'F');
    doc.setTextColor(136, 136, 170);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(8);
    doc.text('Generado por TallerPro · Gestión Inteligente', 105, 286, { align: 'center' });

    // Compartir o descargar
    const pdfBlob = doc.output('blob');
    const fileName = `Factura_${f.clientes?.nombre?.replace(/\s/g,'_') || 'cliente'}_${f.fecha || 'hoy'}.pdf`;

    if (navigator.share && navigator.canShare && navigator.canShare({ files: [new File([pdfBlob], fileName, { type: 'application/pdf' })] })) {
      const file = new File([pdfBlob], fileName, { type: 'application/pdf' });
      await navigator.share({ title: `Factura ${h(tallerNombre)}`, files: [file] });
    } else {
      // Fallback: descargar el PDF
      const url = URL.createObjectURL(pdfBlob);
      const a = document.createElement('a');
      a.href = url;
      a.download = fileName;
      a.click();
      URL.revokeObjectURL(url);
      toast(t('pdfDescargado'), 'success');
    }

  } catch(e) {
    toast('Error al generar PDF: ' + e.message, 'error');
  }
}

async function vincularVehiculoACliente(vehiculoId, perfilId, nombreUsuario) {
  // Obtener o crear ficha de cliente
  const { data: perfil } = await sb.from('perfiles').select('cliente_id, nombre').eq('id', perfilId).maybeSingle();
  let clienteId = perfil?.cliente_id;

  if (!clienteId) {
    // Crear ficha de cliente si no existe
    const { data: cli } = await sb.from('clientes')
      .insert({ nombre: perfil?.nombre || nombreUsuario, taller_id: tid() })
      .select().single();
    if (!cli) { toast('Error al crear ficha de cliente','error'); return; }
    clienteId = cli.id;
    await sb.from('perfiles').update({ cliente_id: clienteId }).eq('id', perfilId);
  }

  await sb.from('vehiculos').update({ cliente_id: clienteId }).eq('id', vehiculoId);
  toast('Vehículo asignado','success');
  closeModal();
  modalVincularVehiculo(perfilId, nombreUsuario);
}

  toast('Vehículo desvinculado','success');

async function generarCodigo(tipo) {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  const arr = new Uint32Array(8);
  crypto.getRandomValues(arr);
  const codigo = Array.from(arr, v => chars[v % chars.length]).join('');
  const { error } = await sb.from('codigos_empleado').insert({ codigo, taller_id: tid(), usado: false, tipo });
  if (error) { toast('Error al generar código','error'); return; }
  document.getElementById(`codigo-generado-${tipo}`).style.display = 'block';
  document.getElementById(`codigo-valor-${tipo}`).textContent = codigo;
}

function copiarCodigoTipo(tipo) {
  const codigo = document.getElementById(`codigo-valor-${tipo}`).textContent;
  navigator.clipboard.writeText(codigo).then(() => toast('Código copiado','success'));
}

function copiarInvitacion(tipo, link) {
  const codigo = document.getElementById(`codigo-valor-${tipo}`).textContent;
  const tipoLabel = tipo === 'empleado' ? 'empleado' : 'cliente';
  const texto = `Hola! Te invito a registrarte en TallerPro.\n\n1. Abrí este link: ${link}\n2. Completá tus datos\n3. Ingresá este código: ${codigo}\n\nEl código es de un solo uso.`;
  navigator.clipboard.writeText(texto).then(() => toast('¡Invitación copiada! Pegala en WhatsApp', 'success'));
}

  const { data: perfil } = await sb.from('perfiles').select('cliente_id').eq('id', currentUser.id).maybeSingle();

  if (!perfil?.cliente_id) {
    document.getElementById('main-content').innerHTML = `
      <div class="empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/></svg>
        <p style="font-size:1rem;margin-bottom:.5rem">${t('cuentaPendiente')}</p>
        <p style="font-size:.8rem">${t('cuentaPendienteMsg')}/p>
      </div>`;
    return;
  }

  const { data } = await sb.from('vehiculos').select('*').eq('cliente_id', perfil.cliente_id);
  document.getElementById('main-content').innerHTML = `
    <div class="section-header"><div class="section-title">${t('misAutos')}</div></div>
    ${(data||[]).length===0 ? `<div class="empty"><p>${t('vehSinDatos')}</p></div>` :
      (data||[]).map(v => `
      <div class="card">
        <div class="card-header">
          ${v.foto_url?`<img src="${safeFotoUrl(v.foto_url)}" style="width:44px;height:44px;object-fit:cover;border-radius:8px">`:`<div class="card-avatar" style="font-size:.8rem">${h(v.patente)}</div>`}
          <div class="card-info"><div class="card-name">${h(v.marca)} ${h(v.modelo||'')}</div><div class="card-sub">${h(v.patente)} · ${h(v.anio||'')}</div></div>
        </div>
      </div>`).join('')}`;
}

async function misReparaciones() {
  if (currentPerfil?.rol !== 'cliente') { dashboard(); return; }

  const { data: perfil } = await sb.from('perfiles').select('cliente_id').eq('id', currentUser.id).maybeSingle();

  if (!perfil?.cliente_id) {
    document.getElementById('main-content').innerHTML = `
      <div class="empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/></svg>
        <p style="font-size:1rem;margin-bottom:.5rem">${t('cuentaPendiente')}</p>
        <p style="font-size:.8rem">${t('cuentaPendienteMsg2')}/p>
      </div>`;
    return;
  }

  const { data } = await sb.from('reparaciones').select('*, vehiculos(patente,marca)').eq('cliente_id', perfil.cliente_id).order('created_at',{ascending:false});
  document.getElementById('main-content').innerHTML = `
    <div class="section-header"><div class="section-title">${t('misReps')}</div></div>
    ${(data||[]).length===0 ? `<div class="empty"><p>${t('repSinDatos')}</p></div>` :
      (data||[]).map(r => `
      <div class="card">
        <div class="card-header">
          <div class="card-avatar">🔧</div>
          <div class="card-info">
            <div class="card-name">${h(r.descripcion)}</div>
            <div class="card-sub">${r.vehiculos?r.vehiculos.patente+' · '+r.vehiculos.marca:''} · ${formatFecha(r.fecha)}</div>
          </div>
          <span class="card-badge ${estadoBadge(r.estado)}">${estadoLabel(r.estado)}</span>
        </div>
      </div>`).join('')}`;
}

</script>
